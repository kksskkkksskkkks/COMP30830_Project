<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up - STATION HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../static/css/auth.css">
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">
    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-50"></div>

    <div
        class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 relative overflow-hidden">

        <div class="flex bg-slate-100 p-1 rounded-2xl mb-10 relative">
            <a href="login.html"
                class="flex-1 text-center py-2 text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">Login</a>
            <div
                class="flex-1 text-center py-2 text-sm font-bold bg-white text-indigo-600 rounded-xl shadow-sm cursor-default">
                Sign Up</div>
        </div>

        <div id="success-overlay"
            class="hidden absolute inset-0 bg-white/98 z-20 flex flex-col items-center justify-center text-center p-8 success-bg">
            <div class="w-20 h-20 bg-emerald-100 text-green-600 rounded-full flex items-center justify-center mb-6">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-2xl font-black text-slate-800">Success!</h3>
            <p class="text-slate-500 mt-2 font-medium">Redirecting you to login...</p>
        </div>

        <form id="register-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">User ID *</label>
                <input type="text" name="user_id" placeholder="Account ID"
                    oninvalid="this.setCustomValidity('Please fill out this field')"
                    oninput="this.setCustomValidity('')"
                    class="w-full bg-slate-50 border-2 border-transparent p-4 rounded-2xl focus:bg-white focus:border-indigo-500 outline-none transition-all"
                    required>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Password *</label>
                <input type="password" name="password" placeholder="••••••••"
                    oninvalid="this.setCustomValidity('Please fill out this field')"
                    oninput="this.setCustomValidity('')"
                    class="w-full bg-slate-50 border-2 border-transparent p-4 rounded-2xl focus:bg-white focus:border-indigo-500 outline-none transition-all"
                    required>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Full Name</label>
                <input type="text" name="full_name" placeholder="Your Name"
                    class="w-full bg-slate-50 border-2 border-transparent p-4 rounded-2xl focus:bg-white focus:border-indigo-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Language</label>
                <select name="preferred_language"
                    class="w-full bg-slate-50 border-2 border-transparent p-4 rounded-2xl focus:bg-white focus:border-indigo-500 outline-none transition-all cursor-pointer">
                    <option value="en" selected>English</option>
                    <option value="it" >Italiano</option>
                    <option value="fr">Français</option>
                    <option value="zh">繁體中文</option>
                    <option value="cn">简体中文</option>
                    <option value="jp">Japanese</option>
                </select>
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all flex justify-center items-center">
                <span id="btn-text">Create Account</span>
                <div id="btn-spinner"
                    class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin ml-3"></div>
            </button>
        </form>
    </div>

    <script src="../static/js/auth.js"></script>
</body>

</html>
