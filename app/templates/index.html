{% extends "layout.html" %}

{% block body_class %}page-map{% endblock %}

{% block title %} — Map{% endblock %}

{% block content %}

    <button id="btn-panel-toggle" aria-label="Open station list" aria-expanded="false" aria-controls="results-panel">
        <span aria-hidden="true" id="toggle-icon">&#8250;</span>
    </button>

    <div id="search-float">
        <div id="search-group" role="search" aria-label="Search address or place">
            <label for="search-input" class="sr-only">Search address or place</label>
            <input id="search-input" type="text" placeholder="Search address or place…" autocomplete="off">
            <button id="btn-locate" class="btn-icon" aria-label="Use my location" title="Use my location">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
            </button>
            <button id="btn-clear" class="btn-icon btn-icon-muted" aria-label="Clear search" title="Clear search" style="display:none;">
                &#x2715;
            </button>
        </div>
    </div>

    <!-- Main layout: results panel + map -->
    <div id="app-layout">

        <div id="results-panel" class="hidden" role="region" aria-label="Nearby stations">
            <div id="panel-header">
                <span id="panel-title">Nearby Stations</span>
                <button id="btn-panel-close" aria-label="Close station list">&#x2715;</button>
            </div>
            <ul id="station-list" aria-live="polite" aria-label="Station list"></ul>
        </div>

        <div id="map" role="application" aria-label="Dublin bike stations map"></div>
        <div id="weather" aria-live="polite" aria-label="Current weather"></div>


    </div>

    <!-- Weather widget -->

{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
    <script src="{{ url_for('static', filename='js/nearby.js') }}"></script>
    <script
        src="https://maps.googleapis.com/maps/api/js?key={{ MAP_KEY }}&libraries=places&callback=initMap"
        async defer>
    </script>
{% endblock %}
