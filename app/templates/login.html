{% extends "layout.html" %}

{% block title %} — Log In{% endblock %}

{% block content %}
<div class="flex items-center justify-center font-sans" style="min-height: calc(100vh - 72px);">
    <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">

        <div class="flex bg-slate-100 p-1 rounded-2xl mb-10">
            <div class="flex-1 text-center py-2 text-sm font-bold bg-white text-[#ff5e5e] rounded-xl shadow-sm cursor-default">
                Login
            </div>
            <a href="/auth/register"
                class="flex-1 text-center py-2 text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">
                Sign Up
            </a>
        </div>

        <form id="login-form" class="space-y-6" method="POST" action="/auth/login">
            {% if error %}
            <div class="bg-red-100 text-red-600 p-3 rounded-xl text-sm font-bold text-center">
                {{ error }}
            </div>
            {% endif %}
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">User ID</label>
                <input type="text" name="user_id" placeholder="Account ID"
                    oninvalid="this.setCustomValidity('Please fill out this field')"
                    oninput="this.setCustomValidity('')"
                    class="w-full bg-slate-50 border-2 border-transparent p-4 rounded-2xl focus:bg-white focus:border-[#ff5e5e] outline-none transition-all"
                    required>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Password</label>
                <input type="password" name="password" placeholder="••••••••"
                    oninvalid="this.setCustomValidity('Please fill out this field')"
                    oninput="this.setCustomValidity('')"
                    class="w-full bg-slate-50 border-2 border-transparent p-4 rounded-2xl focus:bg-white focus:border-[#ff5e5e] outline-none transition-all"
                    required>
            </div>
            <button type="submit"
                class="w-full bg-[#ff5e5e] text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-[#e54d4d] active:scale-95 transition-all">
                Enter System
            </button>
        </form>

    </div>
</div>
{% endblock %}

{% block scripts %}
{% endblock %}
