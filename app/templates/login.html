<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - STATION HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">
    <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">

        <div class="flex bg-slate-100 p-1 rounded-2xl mb-10 relative">
            <div
                class="flex-1 text-center py-2 text-sm font-bold bg-white text-blue-600 rounded-xl shadow-sm cursor-default">
                Login</div>
            <a href="register.html"
                class="flex-1 text-center py-2 text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">Sign
                Up</a>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">User ID</label>
                <input type="text" name="user_id" placeholder="Account ID"
                    oninvalid="this.setCustomValidity('Please fill out this field')"
                    oninput="this.setCustomValidity('')"
                    class="w-full bg-slate-50 border-2 border-transparent p-4 rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all"
                    required>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Password</label>
                <input type="password" name="password" placeholder="••••••••"
                    oninvalid="this.setCustomValidity('Please fill out this field')"
                    oninput="this.setCustomValidity('')"
                    class="w-full bg-slate-50 border-2 border-transparent p-4 rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all"
                    required>
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all">
                Enter System
            </button>
        </form>
    </div>

    <script src="../static/js/auth.js"></script>
</body>

</html>
