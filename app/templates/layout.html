<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}">
    <title>Dublin Bikes{% block title %}{% endblock %}</title>
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-left-group">
            <a class="navbar-brand" href="/">Dublin Bikes</a>
            <a href="/bike/plot" class="btn btn-sm">Prediction Plot</a>
            <a href="/bike/number" class="btn btn-sm">Prediction Number</a>
            <a href="/safety" class="btn btn-sm">Safety</a>
            <a href="/faq" class="btn btn-sm">FAQ</a>
        </div>

        <div class="navbar-links">
            <div class="lang-wrapper">
                <select class="lang-select" id="lang-switcher">
                    <option value="en">EN</option>
                    <option value="fr">FR</option>
                    <option value="it">IT</option>
                    <option value="zh">繁中</option>
                    <option value="cn">简中</option>
                    <option value="jp">JP</option>
                </select>
            </div>
            {% if session.get('user_id') %}
                <a href="/auth/logout" class="btn btn-sm">Log Out</a>
            {% else %}
                <a href="/auth/login"    class="btn btn-sm">Log In</a>
                <a href="/auth/register" class="btn btn-primary btn-sm">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main id="main-content" class="page-content">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}

</body>
</html>
