{% extends "layout.html" %}

{% block title %} — Dual-Model Comprehensive Comparison{% endblock %}

{% block head %}
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        .plot-wrapper { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 40px 20px 80px 20px; min-height: calc(100vh - 72px); box-sizing: border-box;}
        .plot-container { max-width: 1000px; margin: 0 auto 80px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .plot-container h2 { text-align: center; color: #1a202c; margin-bottom: 25px; }

        .control-panel { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .input-group { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #4a5568; }
        .input-group input { padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 6px; outline: none; }
        .btn-predict { padding: 9px 25px; background-color: #2b6cb0; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-predict:hover { background-color: #2c5282; }

        .tab-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .tab-btn {
            padding: 10px 25px;
            border: 1px solid #cbd5e0;
            background: white;
            cursor: pointer;
            font-weight: 600;
            color: #718096;
            transition: all 0.3s;
        }
        .tab-btn:first-child { border-radius: 8px 0 0 8px; }
        .tab-btn:last-child { border-radius: 0 8px 8px 0; }
        .tab-btn.active { background-color: #4a5568; color: white; border-color: #4a5568; z-index: 1; }
        .tab-btn:hover:not(.active) { background-color: #edf2f7; }

        #main-chart { width: 100%; height: 500px; }
        #error-msg { color: #e53e3e; text-align: center; margin-bottom: 10px; font-weight: 600; min-height: 20px; }
    </style>
{% endblock %}

{% block content %}
<div class="plot-wrapper">

<div class="plot-container">
    <h2>🚲 24H Dual-Model Comprehensive Prediction</h2>

    <div class="control-panel">
        <div class="input-group">
            <label>Date:</label>
            <input type="date" id="date-input" lang="en">
        </div>
        <div class="input-group">
            <label>Time:</label>
            <input type="time" id="time-input" lang="en" value="09:00">
        </div>
        <div class="input-group">
            <label>Station ID:</label>
            <input type="number" id="station-input" value="1" min="1" max="117" style="width: 70px;">
        </div>
        <button class="btn-predict" onclick="fetchData()">Update Prediction</button>
    </div>

    <div class="tab-container">
        <button id="btn-all" class="tab-btn active" onclick="switchTab('all')">Comparison</button>
        <button id="btn-bike" class="tab-btn" onclick="switchTab('bike')">Available Bikes</button>
        <button id="btn-stand" class="tab-btn" onclick="switchTab('stand')">Available Stands</button>
    </div>

    <div id="error-msg"></div>
    <div id="main-chart"></div>
</div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const chart = echarts.init(document.getElementById('main-chart'));
    let cachedData = { bike: null, stand: null, labels: [], capacity: 0 };
    let activeMode = 'all';

    document.getElementById('date-input').value = new Date().toISOString().split('T')[0];

    async function fetchData() {
        const date = document.getElementById('date-input').value;
        const time = document.getElementById('time-input').value;
        const stationId = parseInt(document.getElementById('station-input').value);
        const errorMsg = document.getElementById('error-msg');

        errorMsg.innerText = "";

        if (isNaN(stationId) || stationId < 1 || stationId > 117) {
            errorMsg.innerText = "Error: Station ID must be between 1 and 117";
            return;
        }

        const timeStr = time.length === 5 ? `${time}:00` : time;
        const baseUrl = "";

        chart.showLoading({ text: 'Syncing Dual-Model Calculations...' });

        try {
            const [resBike, resStand] = await Promise.all([
                fetch(`${baseUrl}/predict/bike/24h?date=${date}&time=${timeStr}&station_id=${stationId}`),
                fetch(`${baseUrl}/predict/stand/24h?date=${date}&time=${timeStr}&station_id=${stationId}`)
            ]);

            const jsonBike = await resBike.json();
            const jsonStand = await resStand.json();

            if (!resBike.ok || !resStand.ok) throw new Error(jsonBike.error || jsonStand.error || "Request Failed");

            // Cache Data
            cachedData.bike = jsonBike.chart_data.data_available_bikes;
            cachedData.stand = jsonStand.chart_data.data_empty_stands;
            cachedData.labels = jsonBike.chart_data.labels;
            cachedData.capacity = jsonBike.request_info.bike_stands_capacity;

            updateChart();

        } catch (err) {
            errorMsg.innerText = "Error: " + err.message;
            chart.clear();
        } finally {
            chart.hideLoading();
        }
    }

    function switchTab(mode) {
        activeMode = mode;

        document.getElementById('btn-all').classList.toggle('active', mode === 'all');
        document.getElementById('btn-bike').classList.toggle('active', mode === 'bike');
        document.getElementById('btn-stand').classList.toggle('active', mode === 'stand');
        updateChart();
    }

    function updateChart() {
        if (!cachedData.bike) return;

        let series = [];

        const bikeSeries = {
            name: 'Available Bikes (Model B)',
            type: 'line',
            smooth: true,
            data: cachedData.bike,
            itemStyle: { color: '#38a169' },
            areaStyle: { opacity: 0.1, color: '#38a169' },
            lineStyle: { width: 3 }
        };

        const standSeries = {
            name: 'Empty Stands (Model A)',
            type: 'line',
            smooth: true,
            data: cachedData.stand,
            itemStyle: { color: '#e53e3e' },
            areaStyle: { opacity: 0.05, color: '#e53e3e' },
            lineStyle: { width: 3, type: 'dashed' }
        };

        if (activeMode === 'all') {
            series = [bikeSeries, standSeries];
        } else if (activeMode === 'bike') {
            series = [bikeSeries];
        } else {
            series = [standSeries];
        }

        const option = {
            title: {
                text: "Next 24H Station Status Comparison",
                subtext: `Total Capacity: ${cachedData.capacity}`,
                left: 'center'
            },
            tooltip: { trigger: 'axis' },
            legend: { bottom: '5%', data: ['Available Bikes (Model B)', 'Empty Stands (Model A)'] },
            grid: { top: '15%', left: '5%', right: '5%', bottom: '15%', containLabel: true },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: cachedData.labels,
                axisLabel: { formatter: v => v.split(' ')[1].substring(0, 5) }
            },
            yAxis: {
                type: 'value',
                max: cachedData.capacity,
                name: 'Quantity'
            },
            series: series
        };

        chart.setOption(option, true);
    }

    window.addEventListener('resize', () => chart.resize());
    window.onload = fetchData;
</script>
{% endblock %}
